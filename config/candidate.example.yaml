version: 1

# Candidate onboarding now happens through the app itself, not this
# file:
#   1. An admin signs up (POST /api/auth/signup) or is invited by staff
#      -- this creates an Organization.
#   2. The admin invites candidates (or candidates self-signup by
#      typing the exact organization name) -- this creates Candidate
#      rows.
#   3. A candidate fills out their profile + uploads a resume; an admin
#      approves it.
#   4. An admin sets each candidate's search config (keywords,
#      locations, strict_skill_match_required) via the candidate-config
#      API -- this is what used to be the `search:`/`application_policy:`
#      blocks here.
#
# This file now only holds genuine system-wide operating policy.

sources:
  linkedin_jobs:
    enabled: true
    mode: "human_in_loop"
  dice:
    enabled: false      # flip to true once the adapter is built and tested
    mode: "browser_automated"
  monster:
    enabled: false
    mode: "browser_automated"
  techfetch:
    enabled: false
    mode: "browser_automated"
  generic_c2c:
    enabled: false
    mode: "configurable_source_adapter"

limits:
  max_jobs_per_day: 50
  max_emails_per_day: 20
  max_applications_per_day: 20
  max_browser_actions_per_source_per_day: 100
  delay_between_actions_seconds_min: 45
  delay_between_actions_seconds_max: 180
  session_reuse_enabled: true
  dry_run_mode: true
  require_human_approval_before_send: true
  require_human_approval_before_apply: true
  circuit_breaker_error_threshold: 3
  pause_on_captcha_detected: true
  pause_on_unexpected_page_structure: true

follow_up:
  first_follow_up_after_days: 2
  follow_up_every_days: 2
  max_follow_ups: 3
  stop_follow_up_on_reply: true
  stop_follow_up_on_rejection: true
  stop_follow_up_if_recruiter_says_no: true

resume_refresh:
  enabled: true
  frequency: "weekly"
  sources:
    - "Dice"
    - "Monster"
    - "TechFetch"
  rule: "Refresh or re-upload resume only where the platform allows normal resume replacement. Do not bypass restrictions. Pause for human approval if manual upload is required."
