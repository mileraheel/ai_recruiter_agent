sources:
  linkedin_jobs:
    enabled: true
    mode: "human_in_loop"
  linkedin_posts:
    enabled: true
    mode: "human_in_loop"
  dice:
    enabled: true
    mode: "browser_automated"
  monster:
    enabled: true
    mode: "browser_automated"
  techfetch:
    enabled: true
    mode: "browser_automated"
  generic_c2c:
    enabled: true
    mode: "configurable_source_adapter"
limits:
  max_jobs_per_day: 50
  max_emails_per_day: 20
  max_applications_per_day: 20
  delay_between_actions_seconds_min: 45
  delay_between_actions_seconds_max: 180
  dry_run_mode: true
  require_human_approval_before_send: true
  require_human_approval_before_apply: true
follow_up:
  first_follow_up_after_days: 2
  follow_up_every_days: 2
  max_follow_ups: 3
  stop_follow_up_on_reply: true
  stop_follow_up_on_rejection: true
  stop_follow_up_if_recruiter_says_no: true
resume_refresh:
  enabled: true
  frequency: "weekly"
  sources:
    - "dice"
    - "monster"
    - "techfetch"
    - "generic_c2c"
  rule: "Refresh or re-upload resume only where the platform allows normal resume replacement. Do not bypass restrictions. Pause for human approval if manual upload is required."
email:
  provider: "gmail_or_microsoft_graph"
  from_email: "${SENDER_EMAIL}"
  send_mode: "draft_first"
  signature_enabled: true
